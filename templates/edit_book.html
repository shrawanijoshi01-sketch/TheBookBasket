<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Book</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#eef5ff;
}

.container{
    width:600px;
    margin:40px auto;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#1e3a8a;
    margin-bottom:25px;
}

label{
    font-weight:bold;
    display:block;
    margin-top:15px;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

textarea{
    resize:vertical;
    height:120px;
}

button{
    width:100%;
    margin-top:25px;
    padding:14px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.back{
    display:block;
    margin-top:20px;
    text-align:center;
    text-decoration:none;
    color:#2563eb;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Edit Book</h1>

<form action="/admin/update/{{ book[0] }}" method="post">

<label>Title</label>
<input type="text" name="title" value="{{ book[1] }}" required>

<label>Author</label>
<input type="text" name="author" value="{{ book[2] }}" required>

<label>Genre</label>
<input type="text" name="genre" value="{{ book[3] }}" required>

<label>Price</label>
<input type="number" name="price" value="{{ book[4] }}" required>

<label>Stock</label>
<input type="number" name="stock" value="{{ book[5] }}" required>

<label>Description</label>
<textarea name="description">{{ book[6] }}</textarea>

<label>Image URL</label>
<input type="text" name="image" value="{{ book[7] }}" required>

<button type="submit">
Update Book
</button>

</form>

<a href="/admin/books" class="back">
← Back
</a>

</div>

</body>
</html>
