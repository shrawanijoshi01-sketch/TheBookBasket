<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BookBasket | Checkout</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f7fb;
}

.container{
    width:90%;
    max-width:700px;
    margin:50px auto;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#2c3e50;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

input, textarea, select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

textarea{
    resize:none;
}

.total{
    margin-top:25px;
    font-size:24px;
    font-weight:bold;
    color:#27ae60;
    text-align:center;
}

button{
    width:100%;
    margin-top:25px;
    padding:15px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#1b5e20;
}

</style>

</head>
<body>

<div class="container">

<h1>Checkout</h1>

<form action="/place_order" method="post">

<label>Full Name</label>
<input type="text" name="name" required>

<label>Phone Number</label>
<input type="text" name="phone" required>

<label>Delivery Address</label>
<textarea name="address" rows="4" required></textarea>

<label>Payment Method</label>

<select name="payment">
    <option>Cash on Delivery</option>
    <option>UPI</option>
    <option>Credit/Debit Card</option>
</select>

<div class="total">
Total: ₹{{ total }}
</div>

<button type="submit">
Place Order
</button>

</form>

</div>

</body>
</html>
