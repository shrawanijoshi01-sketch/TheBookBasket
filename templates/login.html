<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BookBasket | Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#84fab0,#8fd3f4,#a18cd1);

}

/* Login Box */

.container{

    width:380px;
    background:rgba(255,255,255,.18);

    backdrop-filter:blur(15px);

    border-radius:20px;

    padding:40px;

    box-shadow:0 10px 30px rgba(0,0,0,.25);

}

.logo{

    text-align:center;
    font-size:60px;

}

h1{

    text-align:center;
    color:white;
    margin-top:10px;
    margin-bottom:5px;

}

.subtitle{

    text-align:center;
    color:white;
    margin-bottom:30px;

}

label{

    color:white;
    font-weight:bold;

}

input{

    width:100%;
    padding:13px;

    margin-top:8px;
    margin-bottom:20px;

    border:none;
    border-radius:10px;

    outline:none;

    font-size:16px;

}

button{

    width:100%;
    padding:14px;

    border:none;

    border-radius:10px;

    background:#0f766e;

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    background:#115e59;

    transform:scale(1.03);

}

.links{

    margin-top:20px;

    text-align:center;

}

.links a{

    color:white;

    text-decoration:none;

    font-weight:bold;

}

.links a:hover{

    text-decoration:underline;

}

.footer{

    margin-top:25px;

    text-align:center;

    color:white;

    font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">📚</div>

<h1>BookBasket</h1>

<p class="subtitle">
Welcome back! Login to continue.
</p>

<form action="/login" method="post">

<label>Email</label>

<input
type="email"
name="email"
placeholder="Enter your email"
required>

<label>Password</label>

<input
type="password"
name="password"
placeholder="Enter your password"
required>

<button type="submit">
Login
</button>

</form>

<div class="links">

<p>
Don't have an account?
<a href="/register">Register</a>
</p>

</div>

<div class="footer">

Read • Learn • Grow 📖

</div>

</div>

</body>
</html>
