<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BookBasket | Order Successful</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#eef5ff,#ffffff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{

    width:500px;
    background:white;
    padding:45px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.15);

}

.check{

    width:90px;
    height:90px;
    border-radius:50%;
    background:#4CAF50;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:45px;
    color:white;
    margin-bottom:25px;

}

h1{

    color:#1f2937;
    margin-bottom:15px;

}

p{

    color:#555;
    font-size:17px;
    line-height:1.7;

}

.btn{

    display:inline-block;
    margin-top:30px;
    padding:14px 28px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    transition:.3s;

}

.btn:hover{

    background:#1d4ed8;
    transform:translateY(-2px);

}

</style>

</head>

<body>

<div class="card">

<div class="check">
✓
</div>

<h1>Order Placed Successfully!</h1>

<p>
Thank you for shopping with <b>BookBasket</b> 📚
<br><br>
Your books are getting packed with care and will be on their way soon.
</p>

<a href="/home" class="btn">Continue Shopping</a>

</div>

</body>
</html>
