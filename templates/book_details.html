<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ book[1] }} | BookBasket</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f7fb;
}

.container{
    width:90%;
    max-width:1200px;
    margin:40px auto;
}

.book-card{

    display:flex;
    gap:40px;

    background:white;

    padding:30px;

    border-radius:18px;

    box-shadow:0px 6px 20px rgba(0,0,0,.12);

}

.book-card img{

    width:320px;
    height:470px;
    object-fit:cover;

    border-radius:15px;

}

.details{
    flex:1;
}

.details h1{

    color:#0f766e;
    margin-bottom:15px;

}

.details p{

    margin:12px 0;
    color:#555;
    line-height:1.7;
    font-size:17px;

}

.price{

    color:#0f766e;
    font-size:30px;
    font-weight:bold;
    margin:20px 0;

}

button{

    background:#0f766e;
    color:white;

    border:none;

    padding:14px 28px;

    border-radius:10px;

    cursor:pointer;

    font-size:17px;

}

button:hover{

    background:#115e59;

}

.section-title{

    margin:50px 0 25px;
    color:#0f766e;

}

.recommendations{

    display:flex;

    gap:25px;

    flex-wrap:wrap;

}

.rec-card{

    width:250px;

    background:white;

    border-radius:15px;

    overflow:hidden;

    box-shadow:0px 5px 18px rgba(0,0,0,.1);

    transition:.3s;

}

.rec-card:hover{

    transform:translateY(-8px);

}

.rec-card img{

    width:100%;
    height:300px;
    object-fit:cover;

}

.content{

    padding:18px;

}

.content h3{

    color:#0f766e;
    margin-bottom:10px;

}

.content p{

    color:#666;
    margin:6px 0;

}

a{

    text-decoration:none;

}

</style>

</head>

<body>

<div class="container">

<div class="book-card">

<img src="/static/images/{{ book[7] }}" alt="{{ book[1] }}">

<div class="details">

<h1>{{ book[1] }}</h1>

<p><b>Author:</b> {{ book[2] }}</p>

<p><b>Genre:</b> {{ book[3] }}</p>

<p class="price">₹ {{ book[4] }}</p>

<p>{{ book[6] }}</p>

<form action="/add_to_cart/{{ book[0] }}" method="post">
<button type="submit">🛒 Add to Cart</button>
</form>

</div>

</div>

<h2 class="section-title">✨ You May Also Like</h2>

<div class="recommendations">

{% for rec in recommendations %}

<a href="/book/{{ rec[0] }}">

<div class="rec-card">

<img src="/static/images/{{ rec[7] }}">

<div class="content">

<h3>{{ rec[1] }}</h3>

<p>{{ rec[2] }}</p>

<p><b>{{ rec[3] }}</b></p>

<p style="color:#0f766e;font-weight:bold;">₹ {{ rec[4] }}</p>

</div>

</div>

</a>

{% endfor %}

</div>

</div>

</body>

</html>
