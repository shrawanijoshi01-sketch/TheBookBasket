<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - BookBasket</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#6a11cb,#2575fc);
}

.container{
    width:380px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    color:white;
}

.container h1{
    text-align:center;
    margin-bottom:10px;
    font-size:32px;
}

.container p{
    text-align:center;
    margin-bottom:30px;
    color:#f1f1f1;
}

.input-box{
    margin-bottom:20px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

.input-box input{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:10px;
    font-size:15px;
}

.input-box input:focus{
    border:2px solid white;
}

button{
    width:100%;
    padding:13px;
    background:white;
    color:#2575fc;
    border:none;
    border-radius:10px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#2575fc;
    color:white;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    color:#fff;
    text-decoration:none;
    font-weight:bold;
}

.login-link a:hover{
    text-decoration:underline;
}

.book-icon{
    text-align:center;
    font-size:45px;
    margin-bottom:10px;
}
</style>

</head>
<body>

<div class="container">

    <div class="book-icon">📚</div>

    <h1>BookBasket</h1>
    <p>Create your account</p>

    <form action="/register" method="post">

        <div class="input-box">
            <label>Full Name</label>
            <input type="text" name="full_name" placeholder="Enter your full name" required>
        </div>

        <div class="input-box">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" name="password" placeholder="Create a password" required>
        </div>

        <button type="submit">Register</button>

    </form>

    <div class="login-link">
        Already have an account?
        <a href="/login">Login</a>
    </div>

</div>

</body>
</html>
